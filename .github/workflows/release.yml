name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build themes
        run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/rose-pine.css
            dist/rose-pine-moon.css
          generate_release_notes: true
